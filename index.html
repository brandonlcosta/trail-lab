<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Trail Lab is a static library of local Team SUC and ultrarunning field-guide webapps."
    />
    <title>Trail Lab Static Site Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-bg" aria-hidden="true"></div>
    <div class="progress-top" aria-hidden="true"><span id="progressBar"></span></div>

    <main id="top" class="landing-app">
      <header class="landing-header" aria-label="Site navigation">
        <a class="brand" href="#top" aria-label="Back to Trail Lab home">
          <span class="brand-mark">SUC</span>
          <span>Trail Lab</span>
        </a>
        <nav class="section-nav" aria-label="Landing page sections">
          <a href="#apps">Apps</a>
        </nav>
      </header>

      <section class="hero" aria-labelledby="site-title">
        <p class="guide-label">Static site library</p>
        <h1 id="site-title">Trail Lab</h1>
        <p class="subtitle">
          A simple static home for the webapps stored in the local <code>apps</code>
          folder. Each item opens a self-contained guide made from plain HTML, CSS,
          and JavaScript.
        </p>
      </section>

      <section id="apps" class="section-block" aria-labelledby="apps-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Available webapps</p>
            <h2 id="apps-title">Apps</h2>
          </div>
          <p id="appCount" class="app-count">Loading app manifest...</p>
        </div>

        <div id="appGrid" class="app-list" aria-live="polite">
          <p class="empty-message">Loading apps...</p>
        </div>
      </section>
    </main>

    <button class="top-button" type="button" aria-label="Back to top">Top</button>
    <script src="./script.js"></script>
  </body>
</html>
